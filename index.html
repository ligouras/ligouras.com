<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Open Graph -->
  <meta property="og:title" content="Ligouras — Coming Soon" />
  <meta property="og:description" content="Something new is on the way." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>L</text></svg>" />

  <!-- Fonts: Archivo (headings) + Space Grotesk (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #09090b;          /* deep OLED black */
      --surface: #18181b;
      --fg: #fafafa;          /* primary text */
      --muted: #a1a1aa;       /* secondary text */
      --border: #27272a;
      --accent: #2563eb;      /* brand blue */
      --accent-hover: #3b82f6;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image:
        radial-gradient(60% 60% at 50% 0%, rgba(37, 99, 235, 0.18) 0%, transparent 70%);
      color: var(--fg);
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8125rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 32px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    h1 {
      font-family: "Archivo", system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(2.75rem, 12vw, 4.5rem);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 16px;
      text-shadow: 0 0 28px rgba(250, 250, 250, 0.12);
    }

    h1 .accent { color: var(--accent); }

    .tagline {
      font-size: clamp(1rem, 4vw, 1.2rem);
      color: var(--muted);
      max-width: 38ch;
      margin: 0 auto 40px;
    }

    nav.social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: color 200ms ease, border-color 200ms ease, transform 200ms ease, background 200ms ease;
    }

    .social a:hover {
      color: var(--fg);
      border-color: var(--accent);
      background: #1f2030;
      transform: translateY(-2px);
    }

    .social a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .social svg { width: 22px; height: 22px; }

    footer {
      margin-top: 56px;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
      .social a { transition: none; }
    }
  </style>
</head>
